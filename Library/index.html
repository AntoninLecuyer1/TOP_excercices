<!DOCTYPE html>
<html>
  <head>
    <link rel = "stylesheet" href="style.css"></style>
  </head>
    
<body>
  <button id="addBook" type="button">Add book</button>

  <dialog id="form">
    <h2>Add a book</h2>

    Title <input type="text" id="title" placeholder="Title of the book">
    Author <input type="text" id="author" placeholder="Name of the author">
    
    <div class="checkbox-container">
      <input type="checkbox" class="read" id="read">
      <label for="read">I have read the book</label>
    </div>
    <button id="submit" type="button">Submit</button>
    <button id="cancel" type="button">Cancel</button>
  </dialog>

  <table>  
    <thead>
      <tr>
        <th scope="col" onclick="sortBy('title')"> Title  <i class="sort-icon" id="icon-title">↕</i></th>
        <th scope="col" onclick="sortBy('author')">Author <i class="sort-icon" id="icon-author">↕</i></th>
        <th scope="col" onclick="sortBy('read')">  Read   <i class="sort-icon" id="icon-read">↕</i></th>
        <th scope="col">Delete</th>
      </tr>
    </thead>
    <tbody>
    </tbody>
  </table>

<script src = "script.js"></script>
</body>
</html>
